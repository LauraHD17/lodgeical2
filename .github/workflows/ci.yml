name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Lint + Unit Tests + Build
  # Always runs — no secrets required.
  # -----------------------------------------------------------------------
  test:
    name: Lint · Unit Tests · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dist
          path: dist/
          retention-days: 3

  # -----------------------------------------------------------------------
  # Job 2: E2E Tests (Playwright)
  # Only runs when Supabase secrets are available (i.e. on the main repo,
  # not from forks). Falls back gracefully when secrets are absent.
  # -----------------------------------------------------------------------
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test
    # Skip on forks where secrets won't be available — the smoke tests that
    # only need the dev server are safe to run even without Supabase.
    if: ${{ !github.event.pull_request.head.repo.fork || vars.RUN_E2E_ON_FORKS == 'true' }}

    env:
      # These can be left empty — the smoke tests only check public routes
      # and auth redirects which work even without a live Supabase project.
      VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL || '' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || '' }}
      VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
