name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Lint + Unit Tests + Build
  # Always runs — no secrets required.
  # -----------------------------------------------------------------------
  test:
    name: Lint · Unit Tests · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (Vite)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dist
          path: dist/
          retention-days: 3

  # -----------------------------------------------------------------------
  # Job 2: E2E Tests (Playwright)
  # Runs after job 1 passes. Smoke tests only check public routes and auth
  # redirects, so they work with empty Supabase env vars.
  # -----------------------------------------------------------------------
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test

    env:
      # Smoke tests only check routing / rendering — no real Supabase calls.
      # These stub values satisfy the truthy check in supabaseClient.js so the
      # app boots; any actual API calls will fail fast (DNS NXDOMAIN) and
      # the auth context will resolve to unauthenticated, which is what we test.
      VITE_SUPABASE_URL:           ${{ secrets.VITE_SUPABASE_URL || 'https://e2e-stub.supabase.co' }}
      VITE_SUPABASE_ANON_KEY:      ${{ secrets.VITE_SUPABASE_ANON_KEY || 'e2e-stub-anon-key-not-real' }}
      VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY || 'pk_test_stub' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
